name: Atualizar portarias do DOU

on:
  schedule:
    # 10h UTC = 7h no horário de Brasília
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Atualizar base do DOU
        run: |
          python scripts/atualizar_dou.py --dias 10 --termo "PORTARIA MESP"

      - name: Verificar alterações
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commitar alterações
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Atualiza portarias do DOU"
          git push

      - name: Informar ausência de novas portarias
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "Nenhuma nova portaria encontrada no período pesquisado."
