name: Atualizar portarias do DOU

on:
  schedule:
    # Executa todos os dias às 07:00 no horário de Brasília
    - cron: "0 2 * * *"
      timezone: "America/Sao_Paulo"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HORARIO_AGENDADO_BRT: "Todos os dias às 07:00, horário de Brasília"
  CRON_CONFIGURADO: "0 2 * * *"
  TIMEZONE_CONFIGURADO: "America/Sao_Paulo"

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Atualizar base do DOU sem apagar registros antigos
        run: |
          python scripts/atualizar_dou.py --dias 3 --termo "portaria MESP"

      - name: Inserir informações de atualização na página
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os
          import re

          index_path = Path("index.html")

          if not index_path.exists():
              raise FileNotFoundError("Arquivo index.html não encontrado na raiz do repositório.")

          html = index_path.read_text(encoding="utf-8")

          agora_brt = datetime.now(ZoneInfo("America/Sao_Paulo"))
          agora_utc = datetime.now(ZoneInfo("UTC"))

          ultima_atualizacao_brt = agora_brt.strftime("%d/%m/%Y às %H:%M:%S")
          ultima_atualizacao_utc = agora_utc.strftime("%Y-%m-%d %H:%M:%S UTC")

          horario_agendado = os.environ.get(
              "HORARIO_AGENDADO_BRT",
              "Todos os dias às 07:00, horário de Brasília"
          )

          cron_configurado = os.environ.get("CRON_CONFIGURADO", "0 7 * * *")
          timezone_configurado = os.environ.get("TIMEZONE_CONFIGURADO", "America/Sao_Paulo")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "")

          bloco = f"""
          <div id="info-atualizacao" style="margin: 10px 0 0 0; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.14); color: #ffffff; font-size: 0.82rem; line-height: 1.4;">
            <strong>Última atualização:</strong> {ultima_atualizacao_brt}
            <span style="opacity: 0.85;"> · </span>
            <strong>Agendada:</strong> diariamente às 07:00 BRT
            <span style="opacity: 0.85;"> · </span>
            <strong>Execução:</strong> nº {run_number}
            <br>
            <span style="opacity: 0.82;">
              Cron: {cron_configurado} · Fuso: {timezone_configurado} · UTC: {ultima_atualizacao_utc}
            </span>
          </div>
          """.strip()

          inicio = "<!-- INICIO_INFO_ATUALIZACAO -->"
          fim = "<!-- FIM_INFO_ATUALIZACAO -->"
          novo_trecho = f"{inicio}\n{bloco}\n{fim}"

          if inicio in html and fim in html:
              html = re.sub(
                  rf"{re.escape(inicio)}.*?{re.escape(fim)}",
                  novo_trecho,
                  html,
                  flags=re.DOTALL
              )
          else:
              # Preferencialmente insere o bloco dentro da área azul/verde do cabeçalho,
              # logo após o parágrafo principal, se ele existir.
              padrao_paragrafo_header = r"(Base obtida por raspagem do DOU\.\s*</[^>]+>)"

              if re.search(padrao_paragrafo_header, html, flags=re.IGNORECASE):
                  html = re.sub(
                      padrao_paragrafo_header,
                      r"\1\n" + novo_trecho,
                      html,
                      count=1,
                      flags=re.IGNORECASE
                  )
              elif re.search(r"<body[^>]*>", html, flags=re.IGNORECASE):
                  html = re.sub(
                      r"(<body[^>]*>)",
                      r"\1\n" + novo_trecho + "\n",
                      html,
                      count=1,
                      flags=re.IGNORECASE
                  )
              else:
                  html = novo_trecho + "\n" + html

          index_path.write_text(html, encoding="utf-8")
          PY

      - name: Verificar alterações
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commitar alterações
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Atualiza atos do DOU e horário da atualização"
          git push

      - name: Informar ausência de novas alterações
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "Nenhuma nova alteração encontrada. Nada foi apagado."